<div class="admin-container">

<h1>Admin Login</h1>

<div id="loginSection">

<input
type="text"
id="adminUsername"
placeholder="Admin Username">

<input
type="password"
id="adminPassword"
placeholder="Admin Password">

<button onclick="adminLogin()">
Login
</button>

</div>

<div id="adminDashboard" style="display:none;">

<h1>
Admin Dashboard
</h1>

<br>

<input
type="text"
id="productName"
placeholder="Product Name">

<input
type="number"
id="productPrice"
placeholder="Product Price">

<input
type="text"
id="productImage"
placeholder="Image URL">

<button onclick="addProduct()">
Add Product
</button>

<button onclick="adminLogout()">
Logout
</button>

<br><br>

<h2>
Manage Products
</h2>

<div
id="productList"
class="products">
</div>

</div>

</div>
